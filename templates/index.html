<!DOCTYPE html>
<html lang="pt-BR" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anki</title>
  <script src="{{ url_for('static', filename='js/router.js') }}" type="module" defer></script>
  <script src="{{ url_for('static', filename='js/chart.js') }}" ></script>
  <script src="{{ url_for('static', filename='js/exportFunc.js') }}" type="module" defer></script>
  <script src="{{ url_for('static', filename='js/tailwind.js') }}"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
</head>

<body class="h-screen overflow-hidden flex flex-col bg-white">

  <!-- Header -->
  <header class="sticky top-0 z-40 shadow-md px-4 py-3 bg-white border-b border-neutral-200">
    <div class="flex items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <!-- Botão mobile -->
        <button id="sidebar-toggle"
          class="lg:hidden inline-flex items-center justify-center rounded-md p-2 hover:bg-neutral-100 transition"
          aria-controls="sidebar"
          aria-expanded="false"
          type="button">
          <svg id="icon-open" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

        <p class="text-lg font-semibold">App</p>
      </div>
    </div>
  </header>

  <!-- Área principal -->
  <div class="flex flex-1 min-h-0 relative">

    <!-- Fundo escuro no mobile -->
    <div id="sidebar-backdrop"
      class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <nav id="sidebar"
      class="fixed top-[57px] bottom-0 left-0 z-40 w-64 -translate-x-full bg-white border-r border-neutral-200 p-3
             transition-transform duration-300 ease-in-out
             lg:static lg:translate-x-0 lg:w-56 lg:flex-shrink-0">
      <ul class="flex flex-col gap-2">
        <li id="study"
          class="w-full px-3 py-2 rounded-md hover:bg-neutral-100 hover:scale-[1.02] transition-transform duration-300 cursor-pointer origin-left text-sm md:text-base">
          Estudar
        </li>
        <li id="statistic"
          class="w-full px-3 py-2 rounded-md hover:bg-neutral-100 hover:scale-[1.02] transition-transform duration-300 cursor-pointer origin-left text-sm md:text-base">
          Estatística
        </li>
        <li id="administration"
          class="w-full px-3 py-2 rounded-md hover:bg-neutral-100 hover:scale-[1.02] transition-transform duration-300 cursor-pointer origin-left text-sm md:text-base">
          Adicionar
        </li>
      </ul>
    </nav>

    <!-- Conteúdo -->
    <main id="route" class="flex-1 min-h-0 overflow-y-auto flex flex-col items-center w-full p-4">
      <div role="status" class="mt-6">
        <svg aria-hidden="true" class="w-8 h-8 text-neutral-tertiary animate-spin fill-brand" viewBox="0 0 100 101"
          fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
            fill="currentColor" />
          <path
            d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
            fill="currentFill" />
        </svg>
        <span class="sr-only">Loading...</span>
      </div>
    </main>

    <!-- Alerts -->
    <span id="container-alerts"
      class="fixed bottom-3 right-3 left-3 lg:left-auto lg:w-1/2 flex flex-col items-end gap-2 pointer-events-none z-50">
    </span>
  </div>

  <script>
    (function () {
      const toggleBtn = document.getElementById('sidebar-toggle');
      const sidebar = document.getElementById('sidebar');
      const backdrop = document.getElementById('sidebar-backdrop');
      const iconOpen = document.getElementById('icon-open');
      const iconClose = document.getElementById('icon-close');

      const lgBreakpoint = 1024; // Tailwind lg

      function isDesktop() {
        return window.innerWidth >= lgBreakpoint;
      }

      function openSidebar() {
        sidebar.classList.remove('-translate-x-full');
        sidebar.classList.add('translate-x-0');
        backdrop.classList.remove('hidden');
        iconOpen.classList.add('hidden');
        iconClose.classList.remove('hidden');
        toggleBtn.setAttribute('aria-expanded', 'true');
      }

      function closeSidebar() {
        sidebar.classList.add('-translate-x-full');
        sidebar.classList.remove('translate-x-0');
        backdrop.classList.add('hidden');
        iconOpen.classList.remove('hidden');
        iconClose.classList.add('hidden');
        toggleBtn.setAttribute('aria-expanded', 'false');
      }

      function syncLayout() {
        if (isDesktop()) {
          // No desktop a sidebar fica sempre visível
          sidebar.classList.remove('fixed', 'top-[57px]', 'bottom-0', '-translate-x-full', 'translate-x-0', 'z-40');
          sidebar.classList.add('static', 'h-auto');
          backdrop.classList.add('hidden');
          toggleBtn.classList.add('hidden');
          toggleBtn.setAttribute('aria-expanded', 'true');
        } else {
          // No mobile volta para drawer
          sidebar.classList.remove('static', 'h-auto');
          sidebar.classList.add('fixed', 'top-[57px]', 'bottom-0', 'z-40');
          toggleBtn.classList.remove('hidden');

          // Fecha por padrão ao entrar no mobile
          if (!toggleBtn.dataset.opened) {
            closeSidebar();
          }
        }
      }

      toggleBtn.addEventListener('click', function () {
        const open = toggleBtn.getAttribute('aria-expanded') === 'true';
        if (open) {
          closeSidebar();
          toggleBtn.dataset.opened = '';
        } else {
          openSidebar();
          toggleBtn.dataset.opened = '1';
        }
      });

      backdrop.addEventListener('click', function () {
        closeSidebar();
        toggleBtn.dataset.opened = '';
      });

      window.addEventListener('resize', syncLayout);

      // Fecha com ESC no mobile
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !isDesktop()) {
          closeSidebar();
          toggleBtn.dataset.opened = '';
        }
      });

      syncLayout();
    })();
  </script>
</body>

</html>
