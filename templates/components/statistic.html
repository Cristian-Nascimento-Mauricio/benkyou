

<div class="grid grid-cols-1 xl:grid-cols-2 w-full p-3 sm:p-5 gap-5">

    <!-- Card 1: Comparativo -->
 <div class="w-full p-4 bg-white rounded-2xl shadow space-y-4">

  <!-- Header -->
  <div class="flex items-center justify-between">
    
    <!-- Título -->
    <h2 class="text-lg font-semibold text-gray-700">
      Desempenho por Dia
    </h2>

    <!-- Botões -->
    <div class="flex gap-2">
      <button id="btn-7-days"
        class="px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg">
        7 dias
      </button>

      <button id="btn-15-days"
        class="px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg">
        15 dias
      </button>

      <button id="btn-30-days"
        class="px-3 py-1 text-sm bg-gray-100 hover:bg-gray-200 rounded-lg">
        30 dias
      </button>
    </div>

  </div>

  <!-- Gráfico -->
  <canvas id="graphic"></canvas>

</div>

    <!-- Card 2: Estatísticas -->
    <div class="grid grid-rows-[auto_1fr] gap-3 rounded-2xl bg-white p-4 min-w-0">

        <div class="text-base sm:text-lg font-semibold text-gray-700">
            Estatísticas de acertos e tentativas
        </div>

            <div id="options-category-statistic" class="rounded-xl bg-gray-100 flex items-start ml-auto mr-3 p-3">
                <select
                    class="w-full lg:w-auto border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="ALL">Todos</option>
                    <option value="N5">Vocabulário - N5</option>
                    <option value="N4">Vocabulário - N4</option>
                    <option value="N3">Vocabulário - N3</option>
                    <option value="N2">Vocabulário - N2</option>
                    <option value="N1">Vocabulário - N1</option>
                </select>
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-[1fr_auto] gap-3 min-w-0">

            <div class="rounded-xl bg-gray-100 flex items-center justify-center p-3 min-w-0">
                <div class="flex flex-col gap-4 w-full">

                    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3">
                        <div class="flex flex-col items-center justify-center rounded-xl bg-gray-50 p-4">
                            <span id="out-median" class="text-3xl sm:text-4xl font-bold text-gray-700">-</span>
                            <span class="text-sm text-gray-500">mediana</span>
                        </div>

                        <div class="flex flex-col items-center justify-center rounded-xl bg-gray-50 p-4">
                            <span id="out-average" class="text-3xl sm:text-4xl font-bold text-gray-700">-</span>
                            <span class="text-sm text-gray-500">média</span>
                        </div>

                        <div class="flex flex-col items-center justify-center rounded-xl bg-gray-50 p-4 sm:col-span-2 xl:col-span-1">
                            <span id="out-mode" class="text-3xl sm:text-4xl font-bold text-gray-700">-</span>
                            <span class="text-sm text-gray-500">moda</span>
                        </div>
                    </div>

                    <div class="flex flex-col items-center justify-center rounded-xl bg-gray-50 p-4">
                        <span id="out-quantity-attempts" class="text-3xl sm:text-4xl font-bold text-gray-700">-</span>
                        <span class="text-sm text-gray-500">quantidade</span>
                    </div>

                </div>
            </div>


        </div>
    </div>
</div>

<span class="my-10"></span>

<div class="w-full space-y-3 px-3 sm:px-6 lg:px-10 border rounded-lg min-h-96 bg-white shadow-sm">

    <!-- Filtros -->
    <div class="w-full flex flex-col xl:flex-row gap-3 p-3">
        <span class="flex flex-col sm:flex-row w-full xl:w-2/3 gap-2">
            <select title="teclado" id="options-keyboard"
                class="w-full sm:w-auto border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="romaji" selected disabled hidden>Teclado</option>
                <option value="romaji">Romaji</option>
                <option value="hiragana">Hiragana</option>
                <option value="katakana">Katakana</option>
            </select>

            <input id="in-filter" type="text" placeholder="Digite para filtrar..."
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <button id="btn-filter" type="button"
                class="w-full sm:w-auto bg-blue-500 text-white px-6 py-2 text-sm font-medium rounded-lg hover:bg-blue-600 transition-colors">
                Filtrar
            </button>
        </span>

        <span class="flex w-full xl:w-1/3 gap-2 justify-start xl:justify-center">
            <select id="options-category"
                class="w-full sm:w-auto border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="null" selected disabled hidden>Categoria</option>
                <option value="ALL">Todos</option>
                <option value="N5">Vocabulário - N5</option>
                <option value="N4">Vocabulário - N4</option>
                <option value="N3">Vocabulário - N3</option>
                <option value="N2">Vocabulário - N2</option>
                <option value="N1">Vocabulário - N1</option>
            </select>
        </span>
    </div>

    <!-- Tabela -->
    <div class="px-0 sm:px-4 pb-4 text-gray-700 overflow-x-auto">
        <table class="w-full min-w-[900px] border border-gray-200 rounded-lg overflow-hidden">
            <thead class="bg-gray-100">
                <tr class="text-left text-sm font-semibold text-gray-700">
                    <th class="px-4 py-2 border-b text-center">ID</th>
                    <th class="px-4 py-2 border-b text-center">Palavra</th>
                    <th class="px-4 py-2 border-b text-center">Categoria</th>
                    <th class="px-4 py-2 border-b text-center">Leituras acertos</th>
                    <th class="px-4 py-2 border-b text-center">Significado acertos</th>
                    <th class="px-4 py-2 border-b text-center">Média de acertos</th>
                    <th class="px-4 py-2 border-b text-center">Tentativas</th>
                </tr>
            </thead>

            <tbody id="cards-statistic-table-body" class="text-sm text-gray-800">
            </tbody>
        </table>
    </div>

</div>
