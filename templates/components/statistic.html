<div class="grid grid-rows-2 xl:grid-rows-1 xl:grid-cols-2 w-full  p-5 gap-5">
    <div style="width: 100%;" class="mx-auto p-4 bg-white rounded-2xl shadow">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-semibold text-slate-700">Comparativo</h2>
            <div class="flex gap-2">
                <button id="b7" class="px-3 py-1 text-sm border rounded-full">7d</button>
                <button id="b15" class="px-3 py-1 text-sm border rounded-full">15d</button>
                <button id="b30" class="px-3 py-1 text-sm border rounded-full bg-slate-800 text-white">30d</button>
            </div>
        </div>

        <div class="relative">
            <canvas id="dualChart" class="w-full"></canvas>

            <div id="tooltip"
                class="hidden absolute bg-slate-900 text-white text-xs px-2 py-1 rounded shadow pointer-events-none">
            </div>

            <div class="mt-3 flex gap-4 items-center text-sm">
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full"
                        style="background:#1e293b"></span>Tentativas</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full"
                        style="background:#bfdbfe"></span>Acertos</span>
            </div>
        </div>
    </div>

    <div class="grid grid-rows-[auto_1fr] gap-3 rounded-2xl bg-white p-4">

        <!-- título (linha de cima, ocupa tudo) -->
        <div class="text-lg font-semibold text-gray-700">
            Estátisticas de acertos e tentativas
        </div>

        <!-- área de baixo: dados (esq) + selecionar (dir) -->
        <div class="grid grid-cols-[1fr_auto] gap-3 h-full">

            <!-- dados -->
            <div class="rounded-xl bg-gray-100 flex items-center justify-center">
                <div class="flex flex-col gap-4">

                    <!-- % -->
                    <div class="flex flex-col items-center justify-center rounded-xl bg-gray-50 p-4">
                        <span id='out-percent-correct' class="text-4xl font-bold">
                            -
                        </span>
                        <span class="text-sm text-gray-500">taxa de acerto</span>
                    </div>

                    <!-- quantidade (embaixo do %) -->
                    <div class="flex flex-col items-center justify-center rounded-xl bg-gray-50 p-4">
                        <span id='out-quantity-attempts' class="text-4xl font-bold text-gray-700">
                            128
                        </span>
                        <span class="text-sm text-gray-500">quantidade</span>
                    </div>

                </div>
            </div>

            <!-- selecionar -->
            <div id="options-category-statistic" class="rounded-xl bg-gray-100 flex items-start p-3">
                <select class="border border-gray-300 rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option>Todos</option>
                    <option>Vocabulário - N5</option>
                    <option>Vocabulário - N4</option>
                    <option>Vocabulário - N3</option>
                    <option>Vocabulário - N2</option>
                    <option>Vocabulário - N1</option>

                </select>
            </div>

        </div>

    </div>

</div>

<span class="my-10">

</span>

<div class="w-full space-y-2 px-10 border rounded-lg min-h-96  bg-white shadow-sm">
    <!-- Item 1 -->
    <div class="w-full mb-4 flex flex-col sm:flex-row gap-2">
        <span class="flex w-2/3 p-1 gap-2">
            <select title="teclado" id="options-keyboard" class="border border-gray-300 rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="romaji" selected disabled hidden>
                    Teclado
                </option>
                <option value="romaji">Romaji</option>
                <option value="hiragana">Hiragana</option>
                <option value="katakana">Katakana</option>


            </select>

            <input id="in-filter" type="text" placeholder="Digite para filtrar..." class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm
            focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <button id="btn-filter" type="button" class="w-full sm:w-auto bg-blue-500 text-white px-6 py-2 text-sm font-medium
            rounded-lg hover:bg-blue-600 transition-colors">
                Filtrar
            </button>
        </span>
        <span class="flex w-1/3 p-1 gap-2 justify-center">
            <select id="options-category" class="border border-gray-300 rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="null" selected disabled hidden>
                    Categoria
                </option>
                <option value="ALL">Todos</option>
                <option value="N5">Vocabulário - N5</option>
                <option value="N4">Vocabulário - N4</option>
                <option value="N3">Vocabulário - N3</option>
                <option value="N2">Vocabulário - N2</option>
                <option value="N1">Vocabulário - N1</option>

            </select>


        </span>

    </div>


    <div class="px-4 pb-4 text-gray-700">
        <table class=" w-full border border-gray-200 rounded-lg overflow-hidden">
            <thead class="bg-gray-100">
                <tr class="text-left text-sm font-semibold text-gray-700">
                    <th class="px-4 py-2 border-b text-center">ID</th>
                    <th class="px-4 py-2 border-b text-center">Palavra</th>
                    <th class="px-4 py-2 border-b text-center">Categoria</th>
                    <th class="px-4 py-2 border-b text-center">Leituras acertos</th>
                    <th class="px-4 py-2 border-b text-center">Significado acertos</th>
                    <th class="px-4 py-2 border-b text-center">Media de acertos</th>
                    <th class="px-4 py-2 border-b text-center">Tentativas</th>
                </tr>
            </thead>

            <tbody id="cards-statistic-table-body" class="px-6 text-sm text-gray-800">


            </tbody>
        </table>

    </div>

</div>
