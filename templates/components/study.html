<div class="relative flex flex-row-reverse w-full px-4 sm:px-8 lg:px-12 py-2">
    <button id="btn-open-config"
        class="w-10 h-10 flex items-center justify-center transition-transform duration-150 hover:scale-105 active:scale-95">
        <img src="/static/SVG/config.svg" class="w-6 h-6" alt="Configurações">
    </button>

    <span id="popup-config" class="hidden flex flex-col gap-2 p-2 sm:p-4 
           w-[90vw] max-w-[260px] sm:w-72 
           max-h-[75vh] overflow-y-auto
           rounded-md shadow-xl absolute top-12 right-2 sm:right-0
           bg-white z-30 border border-neutral-200 text-sm">

        <label class="flex items-center gap-2">
            <input data-level="N5" type="checkbox" class="button-level w-4 h-4 accent-green-600">
            N5
        </label>

        <label class="flex items-center gap-2">
            <input data-level="N4" type="checkbox" class="button-level w-4 h-4 accent-green-600">
            N4
        </label>

        <label class="flex items-center gap-2">
            <input data-level="N3" type="checkbox" class="button-level w-4 h-4 accent-green-600">
            N3
        </label>

        <label class="flex items-center gap-2">
            <input data-level="N2" type="checkbox" class="button-level w-4 h-4 accent-green-600">
            N2
        </label>

        <label class="flex items-center gap-2">
            <input data-level="N1" type="checkbox" class="button-level w-4 h-4 accent-green-600">
            N1
        </label>

        <span class="flex flex-col gap-1 pt-1">
            <p class="text-xs">Filtro:</p>
            <div class="flex items-center gap-2">
                <input id="ratio-range" type="range" min="0" max="1" step="0.01" value="0.75"
                    class="w-full h-1 accent-red-600 cursor-pointer" oninput="
                    if (this.value < 0.5) this.value = 0.5;
                    valueLabel.textContent = Number(this.value).toFixed(2)">
                <small id="valueLabel" class="text-xs text-slate-600">0.75</small>
            </div>
        </span>

        <button id="btn-reload-deck"
            class="w-full p-2 mt-1 shadow-md bg-blue-400 rounded-md text-lg hover:brightness-95 active:scale-95 transition">
            ⟲
        </button>

    </span>
</div>

<h1 class="text-center text-2xl sm:text-3xl mb-4 px-4">
    Area de estudo
</h1>

<div class="flex flex-col px-4 sm:px-8 lg:px-12 py-4 items-center justify-start w-full flex-1">
    <p id="word" class="text-center mb-3 text-3xl sm:text-5xl break-words">
    </p>

    <p id="correct-answer" class="text-center mb-3 text-base sm:text-lg">
        <br>
    </p>

    <div class="flex flex-col items-center w-full max-w-md">
        <p id="type-answer" class="text-center m-1"><br></p>

        <div class="flex items-center justify-center gap-2 w-full">
            <button id="btn-validate-answer"
                class="w-10 h-10 bg-gray-300 shadow-lg rounded-md hover:brightness-95 active:scale-95 transition">
                ✓
            </button>

            <input id="in-answer" autocomplete="off"
                class="shadow-lg text-center w-full sm:w-48 px-2 h-10 rounded-md border border-neutral-200" />

            <button id="btn-send"
                class="w-10 h-10 bg-blue-300 shadow-lg rounded-md hover:brightness-95 active:scale-95 transition">
                &gt;
            </button>
        </div>
    </div>
</div>

<div id="popup-modal" tabindex="-1"
    class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 w-full h-full max-h-full">

    <div class="fixed inset-0 bg-black/75"></div>

    <div class="relative p-3 sm:p-4 w-full h-full flex items-center justify-center">
        <div
            class="relative bg-white rounded-md border border-default shadow-sm p-4 sm:p-5 w-[min(100%-1rem,32rem)] mx-auto">

            <button id="btn-close" type="button"
                class="absolute top-3 right-2.5 text-body hover:text-heading rounded-base text-sm w-9 h-9 ms-auto inline-flex justify-center items-center">
                <svg class="w-5 h-5" aria-hidden="true" xmlns="{{ url_for('static', filename='SVG/x.svg') }}" width="24"
                    height="24" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18 17.94 6M18 18 6.06 6" />
                </svg>
            </button>

            <div class="p-4 grid gap-4 text-center">
                <h3 class="text-body text-base sm:text-lg">
                    Deseja adicionar a sua resposta como certa?
                </h3>

                <input id="in-new-answer" type="text"
                    class="w-full px-3 py-2 rounded-md text-center shadow-md border border-neutral-200">

                <div class="flex flex-col sm:flex-row justify-between items-center gap-2">
                    <button id="btn-confirm" type="button"
                        class="w-full sm:w-auto p-2 px-4 bg-green-300 rounded-md hover:brightness-95 active:scale-95 transition">
                        Confirmar
                    </button>
                    <button id="btn-cancel" type="button"
                        class="w-full sm:w-auto p-2 px-4 bg-red-300 rounded-md hover:brightness-95 active:scale-95 transition">
                        Cancelar
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>
