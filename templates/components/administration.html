<h1 class="text-center text-2xl sm:text-3xl mb-4 px-4">
    Administração
</h1>

<div class="w-full max-w-xl mx-auto px-4 sm:px-6">
    <div class="w-full p-4 sm:p-6 bg-white rounded-xl shadow space-y-6">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Palavra (Word)
            </label>
            <input id="input-word" type="text" name="word"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                placeholder="例: 日本">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Leituras (Reading)
            </label>
            <div class="space-y-3">
                <div class="flex flex-col sm:flex-row gap-2">
                    <input id="input-reading" type="text"
                        class="flex-1 px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500"
                        placeholder="例: にほん">
                    <button id="btn-reading-add" type="button"
                        class="px-4 py-2 bg-green-100 text-green-700 rounded hover:bg-green-200 transition">
                        +
                    </button>
                </div>
                <div class="flex flex-wrap gap-2 p-1" id="list-reading"></div>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Significados (Meaning)
            </label>
            <div class="space-y-3">
                <div class="flex flex-col sm:flex-row gap-2">
                    <input id="input-meaning" type="text"
                        class="flex-1 px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500"
                        placeholder="例: Japão">
                    <button id="btn-meaning-add" type="button"
                        class="px-4 py-2 bg-green-100 text-green-700 rounded hover:bg-green-200 transition">
                        +
                    </button>
                </div>
                <div id="list-meaning" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Categoria (Category)
            </label>
            <select id="select-category" name="category"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <option value="N1">N1</option>
                <option value="N2">N2</option>
                <option value="N3">N3</option>
                <option value="N4">N4</option>
                <option value="N5">N5</option>
            </select>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 pt-4">
            <button id="btn-send" type="submit"
                class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">
                Adicionar
            </button>
            <button id="btn-cancel" type="button"
                class="flex-1 px-6 py-3 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition font-medium">
                Cancelar
            </button>
        </div>

        <div id="toast" class="w-full"></div>
    </div>
</div>

<h1 class="text-center text-2xl sm:text-3xl m-4 px-4">
    Palavras já cadastradas
</h1>

<div class="flex flex-col w-full min-h-96 mb-6 px-3 sm:px-4">
    <div class="w-full mb-4 flex flex-col lg:flex-row gap-2">
        <span class="flex flex-col sm:flex-row w-full lg:w-2/3 gap-2 p-1">
            <select title="teclado" id="options-keyboard"
                class="w-full sm:w-auto border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="romaji" selected disabled hidden>
                    Teclado
                </option>
                <option value="romaji">Romaji</option>
                <option value="hiragana">Hiragana</option>
                <option value="katakana">Katakana</option>
            </select>

            <input id="in-filter" type="text" placeholder="Digite para filtrar..."
                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />

            <button id="btn-filter" type="button"
                class="w-full sm:w-auto bg-blue-500 text-white px-6 py-2 text-sm font-medium rounded-lg hover:bg-blue-600 transition-colors">
                Filtrar
            </button>
        </span>

        <span class="flex w-full lg:w-1/3 p-1 gap-2 justify-start lg:justify-center">
            <select id="options-category"
                class="w-full sm:w-auto border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="null" selected disabled hidden>
                    Categoria
                </option>
                <option value="ALL">Todos</option>
                <option value="N5">Vocabulário - N5</option>
                <option value="N4">Vocabulário - N4</option>
                <option value="N3">Vocabulário - N3</option>
                <option value="N2">Vocabulário - N2</option>
                <option value="N1">Vocabulário - N1</option>
            </select>
        </span>
    </div>

    <div class="w-full overflow-x-auto rounded-lg border border-gray-200 bg-white">
        <table class="w-full min-w-[760px]">
            <thead class="bg-gray-100">
                <tr class="text-left text-sm font-semibold text-gray-700">
                    <th class="px-4 py-2 border-b">ID</th>
                    <th class="px-4 py-2 border-b">Palavra</th>
                    <th class="px-4 py-2 border-b">Categoria</th>
                    <th class="px-4 py-2 border-b">Significados</th>
                    <th class="px-4 py-2 border-b">Leituras</th>
                    <th class="px-4 py-2 border-b text-center">Ações</th>
                </tr>
            </thead>

            <tbody id="cards-table-body" class="text-sm text-gray-800">
            </tbody>
        </table>
    </div>
</div>

<div id="popup-modal" tabindex="-1"
    class="hidden overflow-y-auto overflow-x-hidden fixed inset-0 z-50 w-full h-full max-h-full">

    <div class="fixed inset-0 bg-black/75"></div>

    <div class="relative p-3 sm:p-4 w-full h-full flex items-center justify-center">
        <div class="relative bg-white rounded-md border border-default shadow-sm p-4 sm:p-6 w-[min(100%-1rem,32rem)] mx-auto">

            <button id="btn-close-modal" type="button"
                class="absolute top-3 right-2.5 text-body hover:text-heading rounded-base text-sm w-9 h-9 ms-auto inline-flex justify-center items-center">
                <svg class="w-5 h-5" aria-hidden="true" xmlns="{{ url_for('static', filename='SVG/x.svg') }}" width="24"
                    height="24" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18 17.94 6M18 18 6.06 6" />
                </svg>
            </button>

            <div class="p-4 grid gap-4 text-center">
                <h3 class="text-body text-base sm:text-lg">Atualizar card</h3>

                <div id="card-form-container" class="p-0 sm:p-2">
                    <form id="card-form" class="space-y-6">

                        <div class="mb-4">
                            <label for="word" class="block text-sm font-medium text-gray-700 mb-1">Palavra</label>
                            <input type="text" id="in-update-word" name="word"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div class="mb-4">
                            <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                            <select id="select-update-category" name="category"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="N1">N1</option>
                                <option value="N2">N2</option>
                                <option value="N3">N3</option>
                                <option value="N4">N4</option>
                                <option value="N5">N5</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-2">
                                <label class="block text-sm font-medium text-gray-700">Leituras (Reading)</label>
                                <button id="btn-add-new-reading" type="button"
                                    class="text-sm px-3 py-1 bg-green-100 text-green-700 rounded-md hover:bg-green-200 transition">
                                    + Adicionar leitura
                                </button>
                            </div>
                            <div id="reading-fields" class="space-y-2"></div>
                        </div>

                        <div class="mb-6">
                            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-2">
                                <label class="block text-sm font-medium text-gray-700">Significados (Meaning)</label>
                                <button type="button" id="btn-add-new-meaning"
                                    class="text-sm px-3 py-1 bg-green-100 text-green-700 rounded-md hover:bg-green-200 transition">
                                    + Adicionar significado
                                </button>
                            </div>
                            <div id="meaning-fields" class="space-y-2"></div>
                        </div>

                    </form>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 sm:justify-between items-center">
                    <button id="btn-update-confirm" type="button"
                        class="w-full sm:w-auto px-4 py-2 bg-green-300 rounded-md hover:brightness-95">
                        Confirmar
                    </button>
                    <button id="btn-update-cancel" type="button"
                        class="w-full sm:w-auto px-4 py-2 bg-red-300 rounded-md hover:brightness-95">
                        Cancelar
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
